services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  dagster-webserver:
    build:
      context: .
    command: dagster-webserver -h 0.0.0.0 -p 3000 -m movie_pipeline.definitions
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./:/opt/dagster/app
      - ./configs:/opt/dagster/dagster_home
    depends_on:
      - postgres

  dagster-daemon:
    build:
      context: .
    command: dagster-daemon run -m movie_pipeline.definitions
    env_file:
      - .env
    volumes:
      - ./:/opt/dagster/app
      - ./configs:/opt/dagster/dagster_home
    depends_on:
      - postgres

  metabase:
    image: metabase/metabase:latest
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    ports:
      - "3001:3000"
    depends_on:
      - postgres

volumes:
  postgres-data:
